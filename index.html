<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant</title>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: transparent; }

    /* Personnalisation du widget */
    :root {
      --chat--color-primary: #FFFFFF;
      --chat--color-primary-shade-50: #FFFFFF;
      --chat--color-secondary: #F5F5F5;
      --chat--window--width: 100%;
      --chat--window--height: 100%;
      --chat--border-radius: 12px;
      --chat--message--bot--background: #F8F8F8;
      --chat--message--user--background: #2D2D2D;
      --chat--message--user--color: #FFFFFF;
      --chat--header--background: #FFFFFF;
      --chat--header--color: #2D2D2D;
    }

    /* Cartouche épais noir sur le champ de saisie */
.n8n-chat-input,
textarea,
input[type="text"] {
  border: 3px solid #000000 !important;
  border-radius: 8px !important;
  padding: 12px !important;
  background: #FFFFFF !important;
}

/* Texte placeholder en rose */
.n8n-chat-input::placeholder,
textarea::placeholder,
input[type="text"]::placeholder {
  color: #FF69B4 !important;
  font-weight: 500 !important;
  font-style: italic !important;
}
   
  /* Bouton envoyer en rose */
.chat-input-send-button {
  background-color: #FF69B4 !important;
  border: 3px solid #000000 !important;
  border-radius: 8px !important;
  color: #FFFFFF !important;
}

/* Hover : rose foncé au survol */
.chat-input-send-button:hover {
  background-color: #FF1493 !important;
  cursor: pointer !important;
}
    /* Conteneur du champ + bouton */
.chat-input,
.chat-inputs,
[class*="chat-input-wrapper"],
[class*="chat-footer"] {
  display: flex !important;
  align-items: center !important;
  gap: 8px !important;
  padding: 8px !important;
}

/* Champ de saisie — même hauteur que le bouton */
.n8n-chat-input,
textarea,
input[type="text"] {
  height: 48px !important;
  border: 3px solid #000000 !important;
  border-radius: 8px !important;
  padding: 12px !important;
  background: #FFFFFF !important;
  flex: 1 !important;        /* prend tout l'espace disponible */
  align-self: center !important;
}

/* Bouton — même hauteur que le champ */
.chat-input-send-button {
  height: 48px !important;
  width: 48px !important;
  background-color: #FF69B4 !important;
  border: 3px solid #000000 !important;
  border-radius: 8px !important;
  display: flex !important;
  align-items: center !important;
  justify-content: center !important;
  flex-shrink: 0 !important;  /* ne rétrécit pas */
}

/* Icône/flèche à l'intérieur du bouton */
.chat-input-send-button svg path,
.chat-input-send-button svg {
  fill: #FFFFFF !important;
  stroke: #FFFFFF !important;
}

    /* Forcer le widget à prendre tout l'espace */
    #n8n-chat {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="n8n-chat"></div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://charlesvdb.app.n8n.cloud/webhook/f75ee359-cc16-4307-b6af-ecaa2c9f38dd/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',        // 'window' | 'fullscreen'
      showWelcomeScreen: true,
      defaultLanguage: 'fr',
      initialMessages: [
        'Hello 👋',
        'Have any question about buying or selling on Bunqer?'
      ],
      i18n: {
        fr: {
          title: '',
          subtitle: '',
          inputPlaceholder: 'Ask me anything (in any language)…',
          getStarted: 'Démarrer la conversation',
          closeButtonTooltip: 'Fermer',
        },
      },
    });
  </script>
</body>
</html>
